<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitBuddy — Your Workout Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">💪</span>
                <div>
                    <h1>FitBuddy</h1>
                    <p class="subtitle">Your personal workout chatbot</p>
                </div>
            </div>
            <button id="clearBtn" class="clear-btn" title="Clear chat">Clear</button>
        </header>

        <main class="chat-window" id="chatWindow">
            <div class="message bot">
                <div class="avatar">💪</div>
                <div class="bubble">
                    Hey! I'm <strong>FitBuddy</strong>. I can help you build a workout in seconds.
                    Try asking for a <em>chest workout</em>, a <em>15 minute routine</em>, or a
                    <em>beginner plan</em>. Type <strong>help</strong> anytime to see what I can do.
                </div>
            </div>
        </main>

        <div class="suggestions" id="suggestions">
            <button class="chip" data-msg="Beginner workout">🌱 Beginner plan</button>
            <button class="chip" data-msg="15 minute workout">⏱️ Quick 15 min</button>
            <button class="chip" data-msg="Leg day">🦵 Leg day</button>
            <button class="chip" data-msg="How much protein">🥩 Protein tip</button>
            <button class="chip" data-msg="Give me motivation">🔥 Motivation</button>
        </div>

        <form class="input-bar" id="chatForm" autocomplete="off">
            <input
                type="text"
                id="userInput"
                placeholder="Ask for a workout, a tip, or type 'help'..."
                aria-label="Chat input"
                required
            />
            <button type="button" id="micBtn" class="mic-btn" title="Voice input">🎤</button>
            <button type="submit" class="send-btn">Send</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
